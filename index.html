<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitwarden Vault Manager — 密码管理面板</title>
  <meta name="description" content="客户端加密的 Bitwarden 密码管理面板：智能去重、批量操作、健康分析、去重合并" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- ====== LOGIN VIEW ====== -->
    <div id="login-view" class="view">
      <!-- Global Controls (login page) -->
      <div class="global-controls login-controls">
        <button id="lang-toggle-login" class="ctrl-btn" title="Language">
          <span class="ctrl-label" id="lang-label-login">EN</span>
        </button>
        <button id="theme-toggle-login" class="ctrl-btn" title="Theme">
          <span class="ctrl-icon" id="theme-icon-login">☀️</span>
        </button>
      </div>

      <div class="login-container">
        <div class="login-header">
          <div class="logo">
            <svg viewBox="0 0 32 32" width="48" height="48" fill="none">
              <rect width="32" height="32" rx="8" fill="url(#grad)"/>
              <path d="M16 6 L24 10 L24 18 C24 22.42 20.42 26 16 26 C11.58 26 8 22.42 8 18 L8 10 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
              <path d="M13 15 L15 17 L19 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <defs><linearGradient id="grad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#175DDC"/><stop offset="1" stop-color="#6c4bef"/></linearGradient></defs>
            </svg>
          </div>
          <h1>Bitwarden Vault Manager</h1>
          <p class="subtitle" data-i18n="login.subtitle">安全连接你的保险库 · 智能去重 · 批量管理 · 健康分析</p>
        </div>

        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <label for="server-url" data-i18n="login.server">服务器</label>
            <select id="server-url">
              <option value="" data-i18n="login.server.official">bitwarden.com（官方）</option>
              <option value="https://vault.bitwarden.eu" data-i18n="login.server.eu">bitwarden.eu（欧洲）</option>
            </select>
          </div>

          <div class="auth-mode-toggle">
            <button type="button" class="auth-tab active" data-mode="apikey" data-i18n="login.tab.apikey">🔑 API Key（推荐）</button>
            <button type="button" class="auth-tab" data-mode="credfile" data-i18n="login.tab.credfile">🔐 加密文件</button>
          </div>

          <!-- API Key Mode -->
          <div id="auth-apikey" class="auth-panel active">
            <div class="auth-info">
              <p data-i18n="login.apikey.info" data-i18n-html>💡 在 <a href="https://vault.bitwarden.com" target="_blank" rel="noopener">Bitwarden 网页版</a> → <strong>设置</strong> → <strong>安全</strong> → <strong>密钥</strong> → 查看 API 密钥</p>
            </div>
            <div class="form-group">
              <label for="client-id">client_id</label>
              <input type="text" id="client-id" placeholder="user.xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" />
            </div>
            <div class="form-group">
              <label for="client-secret">client_secret</label>
              <input type="password" id="client-secret" data-i18n="login.secret.placeholder" placeholder="你的 API secret" autocomplete="off" />
            </div>
            <div class="form-group">
              <label for="api-email" data-i18n="login.email.label">邮箱（用于密钥派生）</label>
              <input type="email" id="api-email" data-i18n="login.email.placeholder" placeholder="你的 Bitwarden 邮箱" autocomplete="username" />
            </div>
            <div class="form-group">
              <label for="api-password" data-i18n="login.password.label">主密码（仅本地解密，不上传）</label>
              <input type="password" id="api-password" data-i18n="login.password.placeholder" placeholder="你的主密码" autocomplete="current-password" />
            </div>
          </div>

          <!-- Encrypted File Mode -->
          <div id="auth-credfile" class="auth-panel">
            <div class="auth-info">
              <p data-i18n="login.credfile.info" data-i18n-html>🔐 使用加密凭证文件一键登录。登录后可在侧边栏「加密登录」生成文件。</p>
            </div>
            <div id="cred-drop-zone" class="cred-drop-zone">
              <div class="drop-icon">📁</div>
              <div class="drop-text" data-i18n="login.credfile.drop">将加密凭证文件拖拽到此处</div>
              <div class="drop-or" data-i18n="login.credfile.or">或</div>
              <button type="button" class="drop-browse-btn" id="cred-browse-btn" data-i18n="login.credfile.browse">📂 选择文件</button>
              <input type="file" id="cred-file-input" style="display:none" />
            </div>
          </div>

          <div id="login-status" class="login-status"></div>

          <button type="submit" id="login-btn" class="btn-primary" data-i18n="login.btn">登录并分析</button>
          <button type="button" id="demo-btn" class="btn-demo" data-i18n="login.demo">🎮 点击进入演示页面</button>

          <div class="security-note">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1a2 2 0 012 2v2h1a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h1V3a2 2 0 012-2zm0 1.5A.5.5 0 007.5 3v2h1V3A.5.5 0 008 2.5zM8 9a1 1 0 100 2 1 1 0 000-2z"/>
            </svg>
            <span data-i18n="login.security">所有解密操作在本地浏览器完成，主密码不会发送到任何第三方服务器</span>
          </div>

          <div class="open-source-note">
            <span data-i18n="login.opensource">🔓 本项目已开源，请放心使用</span>
            <a href="https://github.com/perfhelf/bitwarden-vault-manager" target="_blank" rel="noopener noreferrer" data-i18n="login.opensource.link">查看源码</a>
          </div>
        </form>
      </div>
    </div>

    <!-- ====== MAIN DASHBOARD ====== -->
    <div id="dashboard-view" class="view" style="display:none">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
              <rect width="32" height="32" rx="8" fill="url(#grad2)"/>
              <path d="M16 6 L24 10 L24 18 C24 22.42 20.42 26 16 26 C11.58 26 8 22.42 8 18 L8 10 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
              <path d="M13 15 L15 17 L19 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <defs><linearGradient id="grad2" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#175DDC"/><stop offset="1" stop-color="#6c4bef"/></linearGradient></defs>
            </svg>
            <span class="sidebar-title">Vault Manager</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item active" data-view="overview">
            <span class="nav-icon">📊</span>
            <span class="nav-label" data-i18n="nav.overview">总览</span>
          </button>

          <!-- ── 五大类型分栏 ── -->
          <div class="sidebar-divider"></div>
          <button class="nav-item" data-view="type-login">
            <span class="nav-icon">🔐</span>
            <span class="nav-label">登录</span>
            <span class="nav-badge" id="badge-type-login"></span>
          </button>
          <button class="nav-item" data-view="type-card">
            <span class="nav-icon">💳</span>
            <span class="nav-label">支付卡</span>
            <span class="nav-badge" id="badge-type-card"></span>
          </button>
          <button class="nav-item" data-view="type-identity">
            <span class="nav-icon">🪪</span>
            <span class="nav-label">身份</span>
            <span class="nav-badge" id="badge-type-identity"></span>
          </button>
          <button class="nav-item" data-view="type-note">
            <span class="nav-icon">📝</span>
            <span class="nav-label">安全笔记</span>
            <span class="nav-badge" id="badge-type-note"></span>
          </button>
          <button class="nav-item" data-view="type-sshkey">
            <span class="nav-icon">🔑</span>
            <span class="nav-label">SSH 密钥</span>
            <span class="nav-badge" id="badge-type-sshkey"></span>
          </button>

          <!-- ── 横切视图 ── -->
          <div class="sidebar-divider"></div>
          <button class="nav-item" data-view="duplicates">
            <span class="nav-icon">🔀</span>
            <span class="nav-label" data-i18n="nav.duplicates">重复项</span>
            <span class="nav-badge warn" id="badge-dup"></span>
          </button>
          <button class="nav-item" data-view="nofolder">
            <span class="nav-icon">📂</span>
            <span class="nav-label" data-i18n="nav.nofolder">无文件夹</span>
            <span class="nav-badge" id="badge-nofolder"></span>
          </button>
          <button class="nav-item" data-view="health">
            <span class="nav-icon">🛡️</span>
            <span class="nav-label" data-i18n="nav.health">健康分析</span>
            <span class="nav-badge" id="badge-health"></span>
          </button>
          <button class="nav-item" data-view="trash">
            <span class="nav-icon">🗑️</span>
            <span class="nav-label" data-i18n="nav.trash">回收站</span>
            <span class="nav-badge" id="badge-trash"></span>
          </button>
          <button class="nav-item" data-view="corrupted">
            <span class="nav-icon">💀</span>
            <span class="nav-label">已损坏</span>
            <span class="nav-badge danger" id="badge-corrupted"></span>
          </button>
          <button class="nav-item" data-view="dead-urls">
            <span class="nav-icon">🔗</span>
            <span class="nav-label">URL已失效</span>
            <span class="nav-badge" id="badge-dead-urls"></span>
          </button>

          <!-- ── 文件夹 ── -->
          <div class="sidebar-divider"></div>
          <div class="sidebar-section-header">
            <span class="sidebar-section-title" data-i18n="nav.folders">📁 文件夹</span>
            <button class="folder-add-btn" id="folder-add-btn" title="新建文件夹">+</button>
          </div>
          <div id="folder-list" class="folder-list"></div>
        </nav>

        <div class="sidebar-footer">
          <button class="nav-item" data-view="credfile">
            <span class="nav-icon">🔐</span>
            <span class="nav-label" data-i18n="nav.credfile">加密登录</span>
          </button>
          <button class="nav-item" id="logout-btn">
            <span class="nav-icon">🚪</span>
            <span class="nav-label" data-i18n="nav.logout">退出</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main id="main-content" class="main-content">
        <!-- Top Search Bar -->
        <div class="top-bar">
          <div class="search-container">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="global-search" class="search-input" data-i18n="search.placeholder" placeholder="搜索名称、用户名、URL...  (按 / 聚焦)" autocomplete="off"/>
            <kbd class="search-kbd">/</kbd>
          </div>
          <button id="sync-btn" class="sync-btn" title="同步密码库">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
            <span data-i18n="nav.sync">同步</span>
          </button>
          <!-- Global Controls (dashboard) -->
          <div class="global-controls dashboard-controls">
            <button id="lang-toggle-dash" class="ctrl-btn" title="Language">
              <span class="ctrl-label" id="lang-label-dash">EN</span>
            </button>
            <button id="theme-toggle-dash" class="ctrl-btn" title="Theme">
              <span class="ctrl-icon" id="theme-icon-dash">☀️</span>
            </button>
          </div>
        </div>

        <!-- Quick Filter Tags -->
        <div id="filter-bar" class="filter-bar" style="display:none">
          <div class="filter-tags" id="filter-tags"></div>
          <div class="filter-actions">
            <select id="sort-select" class="sort-select">
              <option value="name-asc" data-i18n="sort.name.asc">名称 A→Z</option>
              <option value="name-desc" data-i18n="sort.name.desc">名称 Z→A</option>
              <option value="date-desc" data-i18n="sort.date.desc">最新修改</option>
              <option value="date-asc" data-i18n="sort.date.asc">最早修改</option>
            </select>
          </div>
        </div>

        <!-- Views -->
        <div id="view-overview" class="content-view active"></div>
        <div id="view-type-login" class="content-view"></div>
        <div id="view-type-card" class="content-view"></div>
        <div id="view-type-identity" class="content-view"></div>
        <div id="view-type-note" class="content-view"></div>
        <div id="view-type-sshkey" class="content-view"></div>
        <div id="view-duplicates" class="content-view"></div>
        <div id="view-nofolder" class="content-view"></div>
        <div id="view-health" class="content-view"></div>
        <div id="view-folder" class="content-view"></div>
        <div id="view-credfile" class="content-view"></div>
        <div id="view-trash" class="content-view"></div>
        <div id="view-corrupted" class="content-view"></div>
        <div id="view-dead-urls" class="content-view"></div>
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Batch Action Bar (floating) -->
    <div id="batch-bar" class="batch-bar" style="display:none">
      <span id="batch-count"></span>
      <div class="batch-actions">
        <button class="batch-btn move" id="batch-move-btn" data-i18n="batch.move">📁 移动到文件夹</button>
        <button class="batch-btn danger" id="batch-delete-btn" data-i18n="batch.delete">🗑️ 删除</button>
        <button class="batch-btn" id="batch-cancel-btn" data-i18n="batch.cancel">✕ 取消</button>
      </div>
    </div>

    <!-- Item Detail Drawer -->
    <div id="detail-overlay" class="detail-overlay" style="display:none">
      <div id="detail-drawer" class="detail-drawer">
        <div class="detail-header">
          <h3 id="detail-title"></h3>
          <button class="detail-close" id="detail-close-btn">✕</button>
        </div>
        <div id="detail-body" class="detail-body"></div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay" style="display:none">
      <div class="modal-card">
        <h3 id="modal-title"></h3>
        <p id="modal-message"></p>
        <div class="modal-actions">
          <button class="btn-outline" id="modal-cancel" data-i18n="modal.cancel">取消</button>
          <button class="btn-danger" id="modal-confirm" data-i18n="modal.confirm">确认</button>
        </div>
      </div>
    </div>

    <!-- Folder Name Modal (reusable for create/rename) -->
    <div id="folder-modal" class="modal-overlay" style="display:none">
      <div class="modal-card">
        <h3 id="folder-modal-title" data-i18n="folder.new">新建文件夹</h3>
        <input type="text" id="folder-name-input" class="folder-name-input" data-i18n="folder.name.input" placeholder="文件夹名称" autocomplete="off"/>
        <div class="modal-actions">
          <button class="btn-outline" id="folder-modal-cancel" data-i18n="modal.cancel">取消</button>
          <button class="btn-primary" id="folder-modal-confirm" data-i18n="modal.confirm">确认</button>
        </div>
      </div>
    </div>

    <!-- Move to Folder Modal -->
    <div id="move-folder-modal" class="modal-overlay" style="display:none">
      <div class="modal-card">
        <h3 data-i18n="move.title">移动到文件夹</h3>
        <div id="move-folder-list" class="move-folder-list"></div>
        <div class="modal-actions">
          <button class="btn-outline" id="move-folder-cancel" data-i18n="modal.cancel">取消</button>
        </div>
      </div>
    </div>

    <!-- Merge Progress Overlay -->
    <div id="merge-progress-overlay" class="modal-overlay" style="display:none">
      <div class="modal-card merge-progress-card">
        <h3>🔀 批量合并中...</h3>
        <div class="merge-progress-bar-container">
          <div class="merge-progress-bar" id="merge-progress-bar"></div>
        </div>
        <p id="merge-progress-text" class="merge-progress-text">准备中...</p>
      </div>
    </div>

    <!-- Merge Report Modal -->
    <div id="merge-report-modal" class="modal-overlay" style="display:none">
      <div class="modal-card merge-report-card">
        <h3 id="merge-report-title">合并完成</h3>
        <div id="merge-report-body" class="merge-report-body"></div>
        <div class="modal-actions">
          <button class="btn-primary" id="merge-report-close">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
